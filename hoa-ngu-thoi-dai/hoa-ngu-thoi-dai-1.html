<style>
  body { font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif; }
  .hanzi { font-family: "Noto Serif TC", "Microsoft JhengHei", serif; }
  .flip-card { perspective: 1200px; }
  .flip-card-inner { transition: transform .6s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
  .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 1rem; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:1rem;}
  .flip-back { transform: rotateY(180deg); }
  .chip { cursor:pointer; user-select:none; transition: all .15s; }
  .chip:hover { transform: translateY(-2px); }
  .match-btn.correct { background:#bbf7d0 !important; color:#065f46 !important; cursor:default; }
  .match-btn.wrong { background:#fecaca !important; color:#991b1b !important; }
  .match-btn.selected { outline:3px solid #6366f1; }
  .lesson-btn.active { background: linear-gradient(135deg,#6366f1,#a855f7); color:white; }
</style>

/* ============================================================
   STATE & RENDER
   ============================================================ */
let currentLessonId = 1;
let currentTab = "vocab";

const lessonGrid = document.getElementById("lessonGrid");
const lessonHeader = document.getElementById("lessonHeader");
const tabContent = document.getElementById("tabContent");

function renderLessonGrid(){
  lessonGrid.innerHTML = "";
  LESSONS.forEach(l=>{
    const btn = document.createElement("button");
    btn.className = "lesson-btn border rounded-xl py-2 px-2 text-sm hover:bg-indigo-50 transition";
    if(l.id===currentLessonId) btn.classList.add("active");
    btn.innerHTML = `<div class="font-bold">Bài ${l.id}</div>
                     <div class="hanzi text-xs opacity-80">${l.titleZh}</div>`;
    btn.onclick = ()=>{ currentLessonId=l.id; renderLessonGrid(); renderHeader(); renderTab(); };
    lessonGrid.appendChild(btn);
  });
}

function renderHeader(){
  const l = LESSONS.find(x=>x.id===currentLessonId);
  lessonHeader.innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div>
        <div class="text-xs uppercase tracking-widest text-indigo-500 font-semibold">Bài ${l.id}</div>
        <div class="text-2xl font-bold hanzi text-gray-800">${l.titleZh}</div>
        <div class="text-gray-600 italic">${l.titleVi}</div>
      </div>
      <div class="text-sm text-gray-500">
        <i class="fa-solid fa-layer-group mr-1"></i>${l.vocab.length} từ ·
        <i class="fa-solid fa-pen-ruler mr-1"></i>${l.grammar.length} ngữ pháp
      </div>
    </div>`;
}

function setActiveTab(){
  document.querySelectorAll(".tab-btn").forEach(b=>{
    if(b.dataset.tab===currentTab){
      b.classList.add("bg-white","text-indigo-600","border-b-2","border-indigo-600");
    }else{
      b.classList.remove("bg-white","text-indigo-600","border-b-2","border-indigo-600");
    }
  });
}

document.querySelectorAll(".tab-btn").forEach(b=>{
  b.onclick = ()=>{ currentTab=b.dataset.tab; renderTab(); };
});

function renderTab(){
  setActiveTab();
  const l = LESSONS.find(x=>x.id===currentLessonId);
  if(currentTab==="vocab") renderVocab(l);
  else if(currentTab==="grammar") renderGrammar(l);
  else if(currentTab==="passage") renderPassage(l);
  else if(currentTab==="match") renderMatch(l);
  else if(currentTab==="order") renderOrder(l);
}

/* ---------- TTS ---------- */
function speak(text, lang="zh-TW"){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.9;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

        <button id="vNext" class="px-3 py-1 rounded-lg bg-gray-100 hover:bg-gray-200"><i class="fa-solid fa-chevron-right"></i></button>
        <button id="vShuf" class="px-3 py-1 rounded-lg bg-pink-500 text-white hover:bg-pink-600"><i class="fa-solid fa-shuffle"></i></button>
      </div>
    </div>
    <div id="vCardWrap" class="flex justify-center"></div>
    <div class="mt-6">
      <h3 class="font-semibold text-gray-600 mb-2">Toàn bộ từ vựng:</h3>
      <div id="vAll" class="grid sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
    </div>`;
  const drawCard=()=>{
    const v = l.vocab[vocabIdx];
    document.getElementById("vIdx").textContent = vocabIdx+1;
    document.getElementById("vCardWrap").innerHTML = `
      <div id="vCard" class="flip-card w-full max-w-md h-72 cursor-pointer" onclick="this.classList.toggle('flipped')">
        <div class="flip-card-inner">
          <div class="flip-face bg-gradient-to-br from-indigo-100 to-pink-100 shadow-lg">
            <i class="${v.icon} text-6xl text-indigo-500 mb-3"></i>
            <div class="hanzi text-6xl font-bold text-gray-800">${v.hanzi}</div>
            <div class="text-gray-500 mt-2 text-sm">Nhấn để xem nghĩa</div>
            <button onclick="event.stopPropagation();speak('${v.hanzi}')" class="mt-3 text-indigo-600"><i class="fa-solid fa-volume-high"></i> Nghe</button>
          </div>
          <div class="flip-face flip-back bg-white shadow-lg border">
            <div class="text-xl text-indigo-600 font-mono">${v.pinyin}</div>
            <div class="text-sm text-gray-500 italic">Hán Việt: ${v.hv}</div>
            <div class="text-2xl font-bold text-gray-800 mt-1">${v.vi}</div>
            <div class="mt-3 text-center text-gray-700 border-t pt-2">
              <div class="hanzi text-lg">${v.exampleZh}</div>
              <div class="text-sm font-mono text-indigo-500">${v.examplePy}</div>
              <div class="text-sm italic">${v.exampleVi}</div>
            </div>
          </div>
        </div>
      </div>`;
  };
  drawCard();
  document.getElementById("vPrev").onclick=()=>{vocabIdx=(vocabIdx-1+l.vocab.length)%l.vocab.length;drawCard();};
  document.getElementById("vNext").onclick=()=>{vocabIdx=(vocabIdx+1)%l.vocab.length;drawCard();};
  document.getElementById("vFlip").onclick=()=>document.getElementById("vCard").classList.toggle("flipped");
  document.getElementById("vShuf").onclick=()=>{l.vocab.sort(()=>Math.random()-.5);vocabIdx=0;drawCard();renderVocabAll(l);};

  renderVocabAll(l);
}
function renderVocabAll(l){
  const wrap = document.getElementById("vAll");
  wrap.innerHTML = l.vocab.map(v=>`
    <div class="border rounded-xl p-3 flex gap-3 items-center bg-white hover:shadow">
      <i class="${v.icon} text-2xl text-indigo-500 w-8 text-center"></i>
      <div class="flex-1">
        <div class="hanzi text-xl font-bold">${v.hanzi}
          <span class="font-mono text-sm text-indigo-500">${v.pinyin}</span>
        </div>
        <div class="text-sm text-gray-600">${v.vi} <span class="italic text-gray-400">· ${v.hv}</span></div>
      </div>
      <button onclick="speak('${v.hanzi}')" class="text-indigo-500 hover:text-indigo-700"><i class="fa-solid fa-volume-high"></i></button>
    </div>`).join("");
}

/* ---------- 4. MATCHING ---------- */
let matchState = null;
function renderMatch(l){
  const pairs = l.matching.map((p,i)=>({...p, id:i}));
  const left = [...pairs].sort(()=>Math.random()-.5);
  const right = [...pairs].sort(()=>Math.random()-.5);
  matchState = {selL:null, selR:null, done:0, total:pairs.length};
  tabContent.innerHTML = `
    <div class="flex justify-between items-center mb-3">
      <div class="text-gray-600">Nhấn 1 từ Hán + 1 nghĩa để nối. <span class="font-bold">Đúng <span id="mScore">0</span>/${pairs.length}</span></div>
      <button onclick="renderMatch(LESSONS.find(x=>x.id===currentLessonId))" class="px-3 py-1 rounded-lg bg-pink-500 text-white"><i class="fa-solid fa-rotate"></i> Chơi lại</button>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div id="matchL" class="space-y-2"></div>
      <div id="matchR" class="space-y-2"></div>
    </div>`;
  const renderCol=(side, arr)=>{
    const el = document.getElementById(side==="L"?"matchL":"matchR");
    el.innerHTML = arr.map(p=>`
      <button data-id="${p.id}" class="match-btn w-full text-left border rounded-lg px-3 py-2 bg-white hover:bg-indigo-50 hanzi">
        ${side==="L"?p.zh:p.vi}
      </button>`).join("");
    el.querySelectorAll(".match-btn").forEach(b=>{
      b.onclick = ()=>handleMatchClick(side, parseInt(b.dataset.id), b);
    });
  };
  renderCol("L", left);
  renderCol("R", right);
}
function handleMatchClick(side, id, btn){
  if(btn.classList.contains("correct")) return;
  if(side==="L"){
    if(matchState.selL) matchState.selL.classList.remove("selected");
    matchState.selL = btn; btn.classList.add("selected");
  }else{
    if(matchState.selR) matchState.selR.classList.remove("selected");
    matchState.selR = btn; btn.classList.add("selected");
  }
  if(matchState.selL && matchState.selR){
    const lId = parseInt(matchState.selL.dataset.id);
    const rId = parseInt(matchState.selR.dataset.id);
    if(lId===rId){
      matchState.selL.classList.remove("selected"); matchState.selR.classList.remove("selected");
      matchState.selL.classList.add("correct"); matchState.selR.classList.add("correct");
      matchState.done++;
      document.getElementById("mScore").textContent = matchState.done;
      matchState.selL = null; matchState.selR = null;
      if(matchState.done===matchState.total){
        setTimeout(()=>alert("🎉 Hoàn thành! Bạn đã nối đúng tất cả các từ."),200);
      }
    }else{
      const a=matchState.selL, b=matchState.selR;
      a.classList.add("wrong"); b.classList.add("wrong");
      setTimeout(()=>{
        a.classList.remove("wrong","selected"); b.classList.remove("wrong","selected");
      },500);
      matchState.selL = null; matchState.selR = null;
    }
  }
}

/* ---------- 5. SENTENCE ORDER ---------- */
let orderIdx = 0;
let orderPicked = [];
function renderOrder(l){
  orderIdx = 0; orderPicked = [];
  drawOrder(l);
}
function drawOrder(l){
  const item = l.sentenceOrder[orderIdx];
  const shuffled = [...item.words].sort(()=>Math.random()-.5);
  orderPicked = [];
  tabContent.innerHTML = `
    <div class="mb-3 flex justify-between items-center flex-wrap gap-2">
      <div class="text-gray-600">Câu <span class="font-bold">${orderIdx+1}/${l.sentenceOrder.length}</span></div>
      <div class="text-gray-700 italic">Nghĩa: <span class="font-semibold">${item.vi}</span></div>
    </div>
    <div id="oPicked" class="min-h-[60px] border-2 border-dashed rounded-xl p-3 bg-indigo-50 flex flex-wrap gap-2 mb-3"></div>
    <div id="oPool" class="flex flex-wrap gap-2 mb-4"></div>
    <div id="oResult" class="mb-4"></div>
    <div class="flex gap-2 flex-wrap">
      <button id="oCheck" class="px-4 py-2 bg-indigo-500 text-white rounded-lg"><i class="fa-solid fa-check"></i> Kiểm tra</button>
      <button id="oReset" class="px-4 py-2 bg-gray-200 rounded-lg"><i class="fa-solid fa-rotate"></i> Làm lại</button>
      <button id="oNext"  class="px-4 py-2 bg-pink-500 text-white rounded-lg"><i class="fa-solid fa-forward"></i> Câu tiếp theo</button>
    </div>`;
  const pool = document.getElementById("oPool");
  const picked = document.getElementById("oPicked");
  const drawPool=()=>{
    pool.innerHTML = shuffled.map((w,i)=>w===null?"":`
      <button data-i="${i}" class="chip hanzi bg-white border-2 border-indigo-300 rounded-lg px-3 py-2 text-lg shadow-sm">${w}</button>`).join("");
    pool.querySelectorAll(".chip").forEach(b=>{
      b.onclick=()=>{
        const i=parseInt(b.dataset.i);
        orderPicked.push({w:shuffled[i], i});
        shuffled[i]=null;
        drawPicked(); drawPool();
      };
    });
  };
  const drawPicked=()=>{
    picked.innerHTML = orderPicked.map((p,k)=>`
      <button data-k="${k}" class="chip hanzi bg-indigo-500 text-white rounded-lg px-3 py-2 text-lg">${p.w}</button>`).join("")
      || `<span class="text-gray-400 italic">Bấm vào các từ bên dưới để sắp xếp...</span>`;
    picked.querySelectorAll(".chip").forEach(b=>{
      b.onclick=()=>{
        const k=parseInt(b.dataset.k);
        const removed = orderPicked.splice(k,1)[0];
        shuffled[removed.i]=removed.w;
        drawPicked(); drawPool();
      };
    });
  };
  drawPool(); drawPicked();

  document.getElementById("oCheck").onclick=()=>{
    const arr = orderPicked.map(p=>p.w);
    const ok = JSON.stringify(arr)===JSON.stringify(item.correct);
    document.getElementById("oResult").innerHTML = ok
      ? `<div class="p-3 bg-green-100 text-green-800 rounded-lg">
           ✅ Chính xác! <span class="hanzi">${item.correct.join("")}</span>
           <div class="font-mono text-sm">${item.py}</div></div>`
      : `<div class="p-3 bg-red-100 text-red-800 rounded-lg">❌ Chưa đúng. Hãy thử lại!</div>`;
    if(ok) speak(item.correct.join(""));
  };
  document.getElementById("oReset").onclick=()=>drawOrder(l);
  document.getElementById("oNext").onclick=()=>{
    orderIdx=(orderIdx+1)%l.sentenceOrder.length;
    drawOrder(l);
  };
}

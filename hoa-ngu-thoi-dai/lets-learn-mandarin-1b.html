<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>學華語向前走 1B — Let's Learn Mandarin For Children 1B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
:root{--red:#43A047;--gold:#FFB300;--bg:#F1F8E9;--paper:#ffffff;
  --text:#2d2d2d;--muted:#7a7a7a;--green:#66BB6A;--soft-red:#FFF9C4;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'Noto Sans',-apple-system,BlinkMacSystemFont,sans-serif;}
.cn{font-family:'Noto Sans TC','Noto Sans',sans-serif;}
.header{background:linear-gradient(135deg,#66BB6A 0%,#FFD54F 100%);
  color:#fff;padding:34px 20px 28px;text-align:center;
  border-radius:0 0 28px 28px;box-shadow:0 6px 18px rgba(76,175,80,.18);position:relative;}
.header h1{margin:0;font-family:'Noto Sans TC';font-size:2.5em;font-weight:700;letter-spacing:2px;}
.header .sub{margin-top:6px;opacity:.92;font-size:1.05em;}
.header .vn{margin-top:10px;font-size:.95em;opacity:.85;}
.header .stop-tts{position:absolute;top:18px;right:18px;background:rgba(255,255,255,0.2);color:#fff;border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-weight:600;font-size:.85em;backdrop-filter:blur(6px);}
.header .stop-tts:hover{background:rgba(255,255,255,0.35);}
.container{max-width:1200px;margin:0 auto;padding:24px 18px 60px;}
.home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
@media (max-width:900px){.home-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:520px){.home-grid{grid-template-columns:1fr;}}
.lesson-card{background:var(--paper);border-radius:18px;padding:22px 16px 18px;
  text-align:center;box-shadow:0 4px 14px rgba(76,175,80,.08);
  cursor:pointer;transition:all .25s;border:2px solid transparent;}
.lesson-card:hover{transform:translateY(-5px);box-shadow:0 10px 24px rgba(76,175,80,.22);border-color:var(--gold);}
.lesson-card .num{display:inline-block;background:var(--gold);color:#fff;padding:3px 12px;border-radius:14px;font-size:.78em;font-weight:600;margin-bottom:8px;}
.lesson-card .icon{font-size:2.6em;color:var(--red);margin:8px 0 12px;}
.lesson-card .cn-title{font-family:'Noto Sans TC';font-size:1.25em;font-weight:600;margin:2px 0;color:#222;}
.lesson-card .vi-title{color:var(--muted);font-size:.85em;margin-top:6px;}
#lesson{display:none;}
.lesson-header{background:var(--paper);border-radius:16px;padding:16px 20px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.back-btn{background:var(--soft-red);color:var(--red);border:none;padding:10px 16px;border-radius:12px;cursor:pointer;font-weight:700;font-size:.95em;}
.back-btn:hover{background:var(--red);color:#fff;}
.lesson-title h2{margin:0;font-family:'Noto Sans TC';color:var(--red);font-size:1.5em;}
.lesson-title p{margin:4px 0 0;color:var(--muted);font-size:.95em;}
.tab-bar{display:flex;gap:6px;background:var(--paper);padding:8px;border-radius:14px;margin-bottom:20px;overflow-x:auto;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.tab-btn{flex:1;min-width:110px;padding:11px 12px;border:none;background:transparent;cursor:pointer;font-weight:600;color:var(--muted);border-radius:10px;transition:all .2s;white-space:nowrap;font-size:.95em;}
.tab-btn.active{background:linear-gradient(135deg,var(--red),var(--gold));color:#fff;box-shadow:0 4px 10px rgba(76,175,80,.25);}
.tab-btn:hover:not(.active){background:var(--soft-red);color:var(--red);}
.tab-btn i{margin-right:6px;}

.spk{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--soft-red);color:var(--red);border:none;cursor:pointer;margin-left:6px;font-size:.82em;transition:all .15s;vertical-align:middle;padding:0;}
.spk:hover{background:var(--red);color:#fff;transform:scale(1.12);}
.spk:active{transform:scale(.95);}
.spk.big{width:34px;height:34px;font-size:1em;}

/* Vocab */
.vocab-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
@media (max-width:900px){.vocab-grid{grid-template-columns:repeat(2,1fr);}}
@media (max-width:500px){.vocab-grid{grid-template-columns:1fr;}}
.flashcard{perspective:1200px;height:320px;cursor:pointer;}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .7s;transform-style:preserve-3d;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:18px;padding:18px;box-shadow:0 6px 16px rgba(0,0,0,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.flashcard-front{background:linear-gradient(135deg,#fff,#E8F5E9);border:2px solid var(--gold);}
.flashcard-front .fa-ic{font-size:3em;color:var(--red);margin-bottom:10px;}
.flashcard-front .hanzi-wrap{display:flex;align-items:center;gap:6px;}
.flashcard-front .hanzi{font-family:'Noto Sans TC';font-size:2.4em;color:var(--red);font-weight:700;line-height:1.1;}
.flashcard-front .pinyin{color:var(--muted);font-size:1.05em;margin-top:8px;}
.flashcard-front .hint{position:absolute;bottom:10px;right:14px;font-size:.72em;color:#bbb;}
.flashcard-back{background:linear-gradient(135deg,#fff,#FFF9C4);transform:rotateY(180deg);text-align:left;align-items:stretch;justify-content:flex-start;overflow:auto;}
.flashcard-back .vi{color:var(--red);font-weight:700;font-size:1.15em;margin:0;}
.flashcard-back .hv{color:#b8860b;font-style:italic;font-size:.88em;margin:4px 0 12px;}
.flashcard-back .ex{border-top:1px dashed #ddd;padding-top:8px;margin-top:auto;font-size:.85em;}
.flashcard-back .ex .ecn{font-family:'Noto Sans TC';font-size:1.02em;color:#333;}
.flashcard-back .ex .epy{color:var(--muted);font-style:italic;margin:2px 0;font-size:.82em;}
.flashcard-back .ex .evt{color:#555;}

/* Grammar */
.grammar-card{background:var(--paper);border-radius:14px;padding:18px 22px;margin-bottom:14px;border-left:5px solid var(--gold);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.grammar-card h3{margin:0 0 10px;color:var(--red);font-family:'Noto Sans TC';font-size:1.2em;}
.formula{background:var(--soft-red);color:var(--red);padding:8px 16px;border-radius:10px;display:inline-block;font-family:'Noto Sans TC',monospace;font-weight:600;margin-bottom:14px;font-size:1.05em;}
.gex{padding:10px 14px;border-radius:10px;background:#faf6ec;margin-top:10px;}
.gex .ecn{font-family:'Noto Sans TC';font-size:1.1em;color:#222;}
.gex .epy{color:var(--muted);font-style:italic;font-size:.9em;margin:3px 0;}
.gex .evt{color:#555;font-size:.95em;}

/* Passage */
.passage-card{background:var(--paper);border-radius:14px;padding:22px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.passage-card h3{color:var(--red);margin:0 0 14px;font-family:'Noto Sans TC';display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.passage-card .pcn{font-family:'Noto Sans TC';font-size:1.32em;line-height:1.9;color:#222;}
.passage-card .ppy{color:var(--muted);margin-top:14px;font-style:italic;line-height:1.7;font-size:.95em;}
.passage-card .pvt{margin-top:14px;padding:14px;background:var(--soft-red);border-radius:10px;color:#5a1a24;line-height:1.7;display:none;}
.passage-card .pvt.show{display:block;}
.toggle-btn{background:var(--gold);color:#fff;border:none;padding:9px 16px;border-radius:10px;cursor:pointer;margin-top:14px;font-weight:600;}
.toggle-btn:hover{background:var(--red);}
.dialogue-line{padding:10px 14px;margin:8px 0;border-radius:10px;}
.dialogue-line.A{background:#FFF9C4;border-left:4px solid var(--gold);}
.dialogue-line.B{background:#E8F5E9;border-left:4px solid var(--red);}
.dialogue-line .speaker{font-weight:700;color:var(--red);margin-right:8px;}
.dialogue-line .dcn{font-family:'Noto Sans TC';font-size:1.12em;}
.dialogue-line .dpy{color:var(--muted);font-style:italic;font-size:.86em;margin:3px 0;}
.dialogue-line .dvt{color:#555;font-size:.92em;}

/* Matching */
.match-score{text-align:center;font-size:1.25em;font-weight:700;color:var(--red);margin-bottom:14px;}
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.match-col{display:flex;flex-direction:column;gap:10px;}
.match-item{padding:14px 16px;background:var(--paper);border:2px solid #eee;border-radius:12px;cursor:pointer;transition:all .2s;font-size:1.05em;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px;}
.match-item.cn{font-family:'Noto Sans TC';}
.match-item:hover:not(.matched):not(.selected){border-color:var(--gold);background:#fff8e7;}
.match-item.selected{border-color:var(--red);background:var(--soft-red);}
.match-item.matched{background:#C8E6C9;border-color:var(--green);color:#1B5E20;cursor:default;opacity:.75;}
.match-item.wrong{animation:shake .45s;border-color:var(--red);background:#f8d7da;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.replay-btn{display:block;margin:18px auto 0;background:var(--gold);color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600;}
.replay-btn:hover{background:var(--red);}

/* Arrangement */
.arr-wrap{background:var(--paper);border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.arr-counter{color:var(--muted);margin-bottom:8px;font-size:.95em;}
.arr-hint{color:var(--red);margin-bottom:14px;font-weight:600;font-size:1.05em;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.arr-label{font-weight:600;color:var(--muted);font-size:.9em;margin:14px 0 6px;}
.arr-answer{min-height:60px;padding:14px;background:#faf6ec;border:2px dashed var(--gold);border-radius:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.arr-bank{padding:14px;background:#FAFAFA;border-radius:12px;display:flex;flex-wrap:wrap;gap:8px;min-height:50px;}
.word-chip{padding:8px 14px;background:#fff;border:2px solid var(--gold);border-radius:10px;cursor:pointer;font-family:'Noto Sans TC';font-size:1.1em;user-select:none;transition:all .2s;}
.word-chip:hover{background:var(--soft-red);transform:translateY(-2px);}
.word-chip.correct{background:#d4edda;border-color:var(--green);color:#155724;}
.word-chip.wrong{background:#f8d7da;border-color:var(--red);color:#721c24;}
.arr-controls{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
.arr-btn{padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-weight:600;font-size:.95em;}
.arr-btn.primary{background:linear-gradient(135deg,var(--red),var(--gold));color:#fff;}
.arr-btn.secondary{background:var(--soft-red);color:var(--red);}
.arr-btn.ghost{background:#f0f0f0;color:#555;}
.arr-btn:hover{opacity:.9;transform:translateY(-1px);}
.arr-feedback{margin-top:14px;padding:12px 14px;border-radius:10px;font-weight:600;display:none;}
.arr-feedback.show{display:block;}
.arr-feedback.ok{background:#d4edda;color:#155724;}
.arr-feedback.no{background:#f8d7da;color:#721c24;}
.empty-hint{color:#bbb;font-style:italic;font-size:.95em;}

/* Stroke order */
.stroke-info{background:var(--soft-red);color:var(--red);padding:12px 16px;border-radius:10px;margin-bottom:18px;font-size:.92em;}
.stroke-info i{margin-right:6px;}
.stroke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;}
.stroke-card{background:var(--paper);border-radius:14px;padding:16px 14px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);border:2px solid var(--gold);}
.stroke-card .stroke-canvas{width:150px;height:150px;margin:0 auto;background:#F1F8E9;border:1px dashed #66BB6A;border-radius:8px;overflow:hidden;}
.stroke-card .char{font-family:'Noto Sans TC';font-size:1.5em;color:var(--red);margin:10px 0 2px;font-weight:700;}
.stroke-card .pinfo{color:var(--muted);font-size:.82em;margin-bottom:8px;min-height:1.3em;}
.stroke-controls{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
.stroke-btn{padding:6px 9px;border:none;border-radius:8px;background:var(--soft-red);color:var(--red);cursor:pointer;font-size:.78em;font-weight:600;}
.stroke-btn:hover{background:var(--red);color:#fff;}
.stroke-btn.primary{background:var(--gold);color:#fff;}
.stroke-btn.primary:hover{background:var(--red);}

/* Songs */
.song-card{background:var(--paper);border-radius:18px;padding:24px;margin-bottom:18px;box-shadow:0 4px 12px rgba(76,175,80,.1);border:2px solid var(--gold);}
.song-title{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:2px dashed var(--gold);flex-wrap:wrap;}
.song-title i.song-icon{font-size:1.6em;color:#fff;background:var(--gold);padding:14px;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.song-title h3{margin:0;font-family:'Noto Sans TC';color:var(--red);font-size:1.4em;}
.song-title .vi-title{color:var(--muted);font-size:.95em;margin-top:2px;}
.song-play-btn{background:linear-gradient(135deg,var(--red),var(--gold));color:#fff;border:none;padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:600;margin-left:auto;}
.song-play-btn:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(76,175,80,.3);}
.song-line{display:flex;align-items:center;padding:14px;margin:10px 0;background:var(--soft-red);border-radius:12px;border-left:5px solid var(--gold);transition:all .2s;}
.song-line:hover{transform:translateX(4px);box-shadow:0 2px 8px rgba(76,175,80,.15);}
.song-line-num{background:var(--red);color:#fff;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;margin-right:14px;font-size:.95em;}
.song-line-text{flex:1;min-width:0;}
.song-line-cn{font-family:'Noto Sans TC';font-size:1.35em;color:#333;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.song-line-py{color:var(--muted);font-style:italic;margin-top:4px;font-size:.9em;}
.song-line-vi{color:#555;margin-top:4px;font-size:.92em;}

</style>
</head>
<body>
<div class="header">
  <h1 class="cn">學華語向前走 1B</h1>
  <div class="sub">Let's Learn Mandarin (For Children) 1B</div>
  <div class="vn">🎈 6 bài học cho bé · 🔊 TTS · ✍️ Bút thuận</div>
  <button class="stop-tts" onclick="stopSpeak()" title="Dừng phát âm"><i class="fa-solid fa-stop"></i> Dừng</button>
</div>

<div class="container">
  <div id="home"><div class="home-grid" id="homeGrid"></div></div>

  <div id="lesson">
    <div class="lesson-header">
      <button class="back-btn" onclick="goHome()"><i class="fa-solid fa-arrow-left"></i> Quay lại</button>
      <div class="lesson-title">
        <h2 id="lTitleCN" class="cn"></h2>
        <p id="lTitleVI"></p>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="vocab" onclick="switchTab('vocab')"><i class="fa-solid fa-clone"></i> Từ vựng</button>
      <button class="tab-btn" data-tab="grammar" onclick="switchTab('grammar')"><i class="fa-solid fa-book"></i> Ngữ pháp</button>
      <button class="tab-btn" data-tab="passage" onclick="switchTab('passage')"><i class="fa-solid fa-align-left"></i> Đoạn văn</button>
      <button class="tab-btn" data-tab="matching" onclick="switchTab('matching')"><i class="fa-solid fa-link"></i> Nối từ</button>
      <button class="tab-btn" data-tab="arrange" onclick="switchTab('arrange')"><i class="fa-solid fa-arrows-up-down-left-right"></i> Sắp xếp câu</button>
      <button class="tab-btn" data-tab="strokes" onclick="switchTab('strokes')"><i class="fa-solid fa-pen-nib"></i> Bút thuận</button>
      <button class="tab-btn" data-tab="songs" onclick="switchTab('songs')"><i class="fa-solid fa-music"></i> Bài hát</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<script>
const LESSONS = [{"id": 7, "cn": "我會打網球", "vi": "Mình biết chơi quần vợt", "icon": "fa-table-tennis-paddle-ball", "vocab": [{"hanzi": "會", "pinyin": "huì", "vi": "biết, có thể", "hv": "Hội", "icon": "fa-circle-check", "ex_cn": "我會游泳。", "ex_pinyin": "Wǒ huì yóuyǒng.", "ex_vi": "Mình biết bơi."}, {"hanzi": "不會", "pinyin": "bú huì", "vi": "không biết", "hv": "Bất hội", "icon": "fa-circle-xmark", "ex_cn": "我不會跳舞。", "ex_pinyin": "Wǒ bú huì tiàowǔ.", "ex_vi": "Mình không biết nhảy."}, {"hanzi": "打", "pinyin": "dǎ", "vi": "chơi (bóng)", "hv": "Đả", "icon": "fa-baseball-bat-ball", "ex_cn": "我打網球。", "ex_pinyin": "Wǒ dǎ wǎngqiú.", "ex_vi": "Mình chơi quần vợt."}, {"hanzi": "網球", "pinyin": "wǎngqiú", "vi": "quần vợt", "hv": "Võng cầu", "icon": "fa-table-tennis-paddle-ball", "ex_cn": "網球很好玩。", "ex_pinyin": "Wǎngqiú hěn hǎowán.", "ex_vi": "Quần vợt rất vui."}, {"hanzi": "籃球", "pinyin": "lánqiú", "vi": "bóng rổ", "hv": "Lam cầu", "icon": "fa-basketball", "ex_cn": "他打籃球。", "ex_pinyin": "Tā dǎ lánqiú.", "ex_vi": "Cậu ấy chơi bóng rổ."}, {"hanzi": "游泳", "pinyin": "yóuyǒng", "vi": "bơi lội", "hv": "Du vịnh", "icon": "fa-person-swimming", "ex_cn": "我每天游泳。", "ex_pinyin": "Wǒ měitiān yóuyǒng.", "ex_vi": "Ngày nào mình cũng bơi."}, {"hanzi": "跑步", "pinyin": "pǎobù", "vi": "chạy bộ", "hv": "Bào bộ", "icon": "fa-person-running", "ex_cn": "我們去跑步。", "ex_pinyin": "Wǒmen qù pǎobù.", "ex_vi": "Chúng mình đi chạy bộ."}, {"hanzi": "騎腳踏車", "pinyin": "qí jiǎotàchē", "vi": "đi xe đạp", "hv": "Kỵ cước đạp xa", "icon": "fa-bicycle", "ex_cn": "我會騎腳踏車。", "ex_pinyin": "Wǒ huì qí jiǎotàchē.", "ex_vi": "Mình biết đi xe đạp."}, {"hanzi": "唱歌", "pinyin": "chànggē", "vi": "hát", "hv": "Xướng ca", "icon": "fa-microphone", "ex_cn": "妹妹愛唱歌。", "ex_pinyin": "Mèimei ài chànggē.", "ex_vi": "Em gái thích hát."}, {"hanzi": "跳舞", "pinyin": "tiàowǔ", "vi": "nhảy", "hv": "Khiêu vũ", "icon": "fa-person-dress", "ex_cn": "她跳舞很美。", "ex_pinyin": "Tā tiàowǔ hěn měi.", "ex_vi": "Cô ấy nhảy đẹp."}, {"hanzi": "畫畫", "pinyin": "huà const state = {lessonIdx:0,tab:"vocab",arrIdx:0,arrAns:[],arrBank:[],matchSelCN:null,matchScore:0,writers:{}};

// ========= TTS =========
let voices = [];
let unlocked = false;

function loadVoices() {
  voices = speechSynthesis.getVoices();
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
// thử reload voices nhiều lần cho iPhone
setTimeout(loadVoices, 300);
setTimeout(loadVoices, 1000);

function unlockTTS() {
  if (unlocked) return;
  try {
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    speechSynthesis.speak(u);
    unlocked = true;
  } catch(e) {}
}

function speak(text) {
  if (!('speechSynthesis' in window)) {
    alert('Trình duyệt không hỗ trợ phát âm.');
    return;
  }

  // ✅ unlock iOS lần đầu (ngay trong click)
  unlockTTS();

  // ✅ chỉ cancel nếu ĐANG nói (tránh bug iOS)
  if (speechSynthesis.speaking || speechSynthesis.pending) {
    speechSynthesis.cancel();
  }

  // reload voices nếu rỗng
  if (!voices.length) voices = speechSynthesis.getVoices();

  const u = new SpeechSynthesisUtterance(text);
  const zhVoice = voices.find(v =>
     v.lang === 'zh-CN'
  );
  if (zhVoice) u.voice = zhVoice;
  u.lang  = zhVoice ? zhVoice.lang : 'zh-TW'; // iPhone có zh-CN sẵn
  u.rate  = 0.7;   // ✅ không để 0.7 (iOS hay bug)
  u.pitch = 1.0;
  u.volume = 1.0;

  // ✅ delay nhỏ để iPhone kịp chuẩn bị
  setTimeout(() => speechSynthesis.speak(u), 60);
}

function stopSpeak() { window.speechSynthesis.cancel(); }

function spk(t, big) {
  const cls = big ? 'spk big' : 'spk';
  const enc = JSON.stringify(t).replace(/"/g, '&quot;');
  // ✅ BỎ event.stopPropagation() — chính nó chặn unlock iOS
  return `<button class="${cls}" onclick="event.stopPropagation();speak(${enc})" title="Phát âm"><i class="fa-solid fa-volume-high"></i></button>`;
}

function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

  document.getElementById("home").style.display="block";
  document.getElementById("lesson").style.display="none";
  const grid=document.getElementById("homeGrid");
  grid.innerHTML=LESSONS.map((l,i)=>`
    <div class="lesson-card" onclick="openLesson(${i})">
      <div class="num">Bài ${l.id}</div>
      <div class="icon"><i class="fa-solid ${l.icon}"></i></div>
      <div class="cn-title">${esc(l.cn)}</div>
      <div class="vi-title">${esc(l.vi)}</div>
    </div>`).join("");
}

function goHome(){stopSpeak();state.tab="vocab";state.arrIdx=0;renderHome();window.scrollTo({top:0,behavior:"smooth"});}

function openLesson(idx){
  stopSpeak();
  state.lessonIdx=idx;state.tab="vocab";state.arrIdx=0;
  document.getElementById("home").style.display="none";
  document.getElementById("lesson").style.display="block";
  const l=LESSONS[idx];
  document.getElementById("lTitleCN").textContent="Bài "+l.id+": "+l.cn;
  document.getElementById("lTitleVI").textContent=l.vi;
  switchTab("vocab");
  window.scrollTo({top:0,behavior:"smooth"});
}

function switchTab(name){
  stopSpeak();
  state.tab=name;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===name));
  const L=LESSONS[state.lessonIdx];
  if(name==="vocab")renderVocab(L);
  else if(name==="grammar")renderGrammar(L);
  else if(name==="passage")renderPassage(L);
  else if(name==="matching")renderMatching(L);
  else if(name==="arrange"){state.arrIdx=0;renderArrangement(L);}
  else if(name==="strokes")renderStrokes(L);
  else if(name==="songs")renderSongs(L);
}

function renderMatching(L){
  const pairs=L.matching;
  state.matchSelCN=null;state.matchScore=0;
  const leftItems=shuffle(pairs.map((p,i)=>({text:p[0],idx:i})));
  const rightItems=shuffle(pairs.map((p,i)=>({text:p[1],idx:i})));
  const left=leftItems.map(it=>`<div class="match-item cn" data-side="cn" data-idx="${it.idx}" onclick="onMatchClick(this)"><span>${esc(it.text)}</span>${spk(it.text)}</div>`).join("");
  const right=rightItems.map(it=>`<div class="match-item" data-side="vi" data-idx="${it.idx}" onclick="onMatchClick(this)">${esc(it.text)}</div>`).join("");
  document.getElementById("tabContent").innerHTML=`
    <div class="match-score" id="matchScore">Đã nối: 0 / ${pairs.length}</div>
    <div class="match-wrap">
      <div class="match-col">${left}</div>
      <div class="match-col">${right}</div>
    </div>
    <button class="replay-btn" onclick="renderMatching(LESSONS[state.lessonIdx])"><i class="fa-solid fa-rotate"></i> Chơi lại</button>`;
}

function onMatchClick(el){
  if(el.classList.contains("matched"))return;
  const side=el.dataset.side;
  const idx=parseInt(el.dataset.idx);
  if(side==="cn"){
    document.querySelectorAll('.match-item[data-side="cn"]').forEach(x=>x.classList.remove("selected"));
    el.classList.add("selected");
    state.matchSelCN={el,idx};
  }else{
    if(!state.matchSelCN){el.classList.add("wrong");setTimeout(()=>el.classList.remove("wrong"),500);return;}
    if(state.matchSelCN.idx===idx){
      state.matchSelCN.el.classList.remove("selected");
      state.matchSelCN.el.classList.add("matched");
      el.classList.add("matched");
      state.matchSelCN=null;
      state.matchScore++;
      const total=LESSONS[state.lessonIdx].matching.length;
      document.getElementById("matchScore").textContent=`Đã nối: ${state.matchScore} / ${total}`;
      if(state.matchScore===total)document.getElementById("matchScore").innerHTML=`🎉 Hoàn thành! ${state.matchScore} / ${total}`;
    }else{
      const w1=state.matchSelCN.el;
      w1.classList.add("wrong");el.classList.add("wrong");
      setTimeout(()=>{w1.classList.remove("wrong","selected");el.classList.remove("wrong");},600);
      state.matchSelCN=null;
    }
  }
}

function renderArrangement(L){
  const total=L.arrangement.length;
  if(state.arrIdx>=total)state.arrIdx=0;
  if(state.arrIdx<0)state.arrIdx=total-1;
  const cur=L.arrangement[state.arrIdx];
  state.arrAns=[];
  state.arrBank=shuffle(cur.words.map((w,i)=>({w,id:i+"_"+Math.random()})));
  drawArrangement(cur,total);
}

function drawArrangement(cur,total){
  const ansSentence = state.arrAns.map(x=>x.w).join("");
  const ansHtml=state.arrAns.length===0
    ? `<span class="empty-hint">Bấm vào các từ bên dưới để ghép câu...</span>`
    : state.arrAns.map(item=>`<span class="word-chip ${item.cls||''}" onclick="arrRemove('${item.id}')">${esc(item.w)}</span>`).join("");
  const bankHtml=state.arrBank.length===0
    ? `<span class="empty-hint">(hết từ)</span>`
    : state.arrBank.map(item=>`<span class="word-chip" onclick="arrAdd('${item.id}')">${esc(item.w)}</span>`).join("");
  const playBtn = state.arrAns.length>0 ? spk(ansSentence) : '';
  document.getElementById("tabContent").innerHTML=`
    <div class="arr-wrap">
      <div class="arr-counter">Câu ${state.arrIdx+1} / ${total}</div>
      <div class="arr-hint">💡 ${esc(cur.vi)}</div>
      <div class="arr-label">Câu của bạn: ${playBtn}</div>
      <div class="arr-answer">${ansHtml}</div>
      <div class="arr-label">Các từ:</div>
      <div class="arr-bank">${bankHtml}</div>
      <div class="arr-feedback" id="arrFb"></div>
      <div class="arr-controls">
        <button class="arr-btn primary" onclick="arrCheck()"><i class="fa-solid fa-check"></i> Kiểm tra</button>
        <button class="arr-btn secondary" onclick="arrShowAnswer()"><i class="fa-solid fa-eye"></i> Đáp án</button>
        <button class="arr-btn ghost" onclick="arrReset()"><i class="fa-solid fa-rotate"></i> Làm lại</button>
        <button class="arr-btn ghost" onclick="arrPrev()"><i class="fa-solid fa-arrow-left"></i> Câu trước</button>
        <button class="arr-btn ghost" onclick="arrNext()">Câu sau <i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </div>`;
}

function arrAdd(id){const i=state.arrBank.findIndex(x=>x.id===id);if(i<0)return;const item=state.arrBank.splice(i,1)[0];state.arrAns.push(item);const L=LESSONS[state.lessonIdx];drawArrangement(L.arrangement[state.arrIdx],L.arrangement.length);}
function arrRemove(id){const i=state.arrAns.findIndex(x=>x.id===id);if(i<0)return;const item=state.arrAns.splice(i,1)[0];item.cls="";state.arrBank.push(item);const L=LESSONS[state.lessonIdx];drawArrangement(L.arrangement[state.arrIdx],L.arrangement.length);}
function arrCheck(){const L=LESSONS[state.lessonIdx];const correct=L.arrangement[state.arrIdx].words;if(state.arrAns.length!==correct.length){showFb(false,"❌ Bạn chưa ghép hết các từ!");return;}let allOk=true;for(let i=0;i<correct.length;i++){if(state.arrAns[i].w===correct[i]){state.arrAns[i].cls="correct";}else{state.arrAns[i].cls="wrong";allOk=false;}}drawArrangement(L.arrangement[state.arrIdx],L.arrangement.length);if(allOk)showFb(true,"🎉 Chính xác! Bạn giỏi quá!");else showFb(false,"❌ Chưa đúng! Hãy thử lại nhé.");}
function arrShowAnswer(){const L=LESSONS[state.lessonIdx];const correct=L.arrangement[state.arrIdx].words;state.arrAns=correct.map((w,i)=>({w,id:"ans_"+i,cls:"correct"}));state.arrBank=[];drawArrangement(L.arrangement[state.arrIdx],L.arrangement.length);showFb(true,"📖 Đây là đáp án đúng.");}
function arrReset(){renderArrangement(LESSONS[state.lessonIdx]);}
function arrPrev(){state.arrIdx--;renderArrangement(LESSONS[state.lessonIdx]);}
function arrNext(){state.arrIdx++;renderArrangement(LESSONS[state.lessonIdx]);}
function showFb(ok,msg){const fb=document.getElementById("arrFb");if(!fb)return;fb.className="arr-feedback show "+(ok?"ok":"no");fb.textContent=msg;}

// ========= Stroke order =========
function renderStrokes(L){
  // Extract unique Chinese characters from vocab.hanzi
  const charsMap = {};
  L.vocab.forEach(v => {
    for (const ch of v.hanzi) {
      const code = ch.codePointAt(0);
      if (code >= 0x4E00 && code <= 0x9FFF) {
        if (!charsMap[ch]) {
          charsMap[ch] = {pinyin: v.pinyin, vi: v.vi};
        }
      }
    }
  });
  const chars = Object.keys(charsMap);
  const cardsHtml = chars.map((ch, idx) => `
    <div class="stroke-card">
      <div class="stroke-canvas" id="hw_${idx}"></div>
      <div class="char">${esc(ch)} ${spk(ch)}</div>
      <div class="pinfo">${esc(charsMap[ch].pinyin)} · ${esc(charsMap[ch].vi)}</div>
      <div class="stroke-controls">
        <button class="stroke-btn primary" onclick="hwAnim(${idx})"><i class="fa-solid fa-play"></i> Xem</button>
        <button class="stroke-btn" onclick="hwQuiz(${idx})"><i class="fa-solid fa-pencil"></i> Tập viết</button>
        <button class="stroke-btn" onclick="hwReset(${idx})"><i class="fa-solid fa-rotate"></i></button>
      </div>
    </div>
  `).join("");
  document.getElementById("tabContent").innerHTML = `
    <div class="stroke-info">
      <i class="fa-solid fa-circle-info"></i> Có <b>${chars.length}</b> chữ Hán trong bài. Bấm <b>Xem</b> để xem thứ tự nét, <b>Tập viết</b> để tự vẽ thử.
    </div>
    <div class="stroke-grid">${cardsHtml}</div>
  `;
  // Create HanziWriter instances
  state.writers = {};
  setTimeout(() => {
    chars.forEach((ch, idx) => {
      try {
        state.writers[idx] = HanziWriter.create('hw_' + idx, ch, {
          width: 150, height: 150, padding: 5,
          strokeAnimationSpeed: 1, delayBetweenStrokes: 250,
          showOutline: true, showCharacter: true,
          strokeColor: '#43A047', outlineColor: '#ddd',
          radicalColor: '#FFB300'
        });
      } catch(e) { console.warn('HW failed', ch, e); }
    });
  }, 50);
}
function hwAnim(idx){if(state.writers[idx])state.writers[idx].animateCharacter();}
function hwQuiz(idx){if(state.writers[idx]){state.writers[idx].hideCharacter();state.writers[idx].quiz({onComplete:function(){setTimeout(()=>{state.writers[idx].showCharacter();},500);}});}}
function hwReset(idx){if(state.writers[idx]){state.writers[idx].showCharacter();}}
function renderSongs(L){
  if(!L.songs||L.songs.length===0){
    document.getElementById("tabContent").innerHTML='<div class="passage-card"><p style="text-align:center;color:var(--muted);">Bài này chưa có bài hát.</p></div>';
    return;
  }
  const html=L.songs.map(song=>{
    const allLyrics=song.lines.map(l=>l.cn).join("，");
    const lines=song.lines.map((l,i)=>`
      <div class="song-line">
        <div class="song-line-num">${i+1}</div>
        <div class="song-line-text">
          <div class="song-line-cn">${esc(l.cn)}${spk(l.cn)}</div>
          <div class="song-line-py">${esc(l.pinyin)}</div>
          <div class="song-line-vi">${esc(l.vi)}</div>
        </div>
      </div>
    `).join("");
    const allEnc = JSON.stringify(allLyrics).replace(/"/g, '&quot;');
    return `
      <div class="song-card">
        <div class="song-title">
          <i class="fa-solid fa-music song-icon"></i>
          <div>
            <h3 class="cn">${esc(song.title_cn)}</h3>
            <div class="vi-title">${esc(song.title_vi)}</div>
          </div>
          <button class="song-play-btn" onclick="speak(${allEnc})"><i class="fa-solid fa-play"></i> Hát cả bài</button>
        </div>
        ${lines}
      </div>
    `;
  }).join("");
  document.getElementById("tabContent").innerHTML=html;
}


renderHome();
</script>
